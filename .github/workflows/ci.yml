name: ci

# This project is a west project in the com-junkawasaki/root superproject; its
# langgraph-clj dep references a sibling repo via :local/root
# (../../com-junkawasaki/langgraph-clj). That repo is PUBLIC, so the test job
# reconstructs the workspace layout by checking it out into the expected
# relative path — no token needed. org-oasis-open-xmile is a plain :git/sha
# dependency (like org-oasis-open-xmile's own dsl-core dep) and needs no
# sibling checkout at all — tools.deps fetches it over the network.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      # lay the west workspace out so ../../com-junkawasaki/* resolves
      - uses: actions/checkout@v4
        with: { path: orgs/etzhayyim/com-etzhayyim-yosoku }
      - uses: actions/checkout@v4
        with:
          repository: com-junkawasaki/langgraph-clj
          path: orgs/com-junkawasaki/langgraph-clj
      - uses: actions/checkout@v4
        with:
          repository: com-junkawasaki/langchain-clj
          path: orgs/com-junkawasaki/langchain-clj
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (scenario contract · store parity · advisor · ledger)
        working-directory: orgs/etzhayyim/com-etzhayyim-yosoku
        run: clojure -M:dev:test
